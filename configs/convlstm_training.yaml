# Phase-E narrow ConvLSTM trainer defaults aligned with canonical contract.
convlstm_training:
  sequence_length: 3
  input_channels: 10
  input_shape: [3, 10, 64, 64]
  stored_target_shape: [1, 10, 64, 64]
  supervised_target_shape: [1, 1, 64, 64]
  target_policy: plume_only
  plume_target_channel: 0
  normalization_mode: none
  loss_space: transformed_plume
  # Training loss remains in transformed plume space.
  # Raw-space interpretation requires inverse transform:
  # raw = (exp(pred) - 1) / 1e12
  raw_interpretation_formula: "raw = (exp(pred) - 1) / 1e12"
  learning_rate: 0.001
  trainable_parameter_scope: full_model

  eval_metric: val_mse
  eval_direction: min
  checkpoint_metric: val_mse
  checkpoint_direction: min
  save_best_only: true

  # Phase-G physics-loss scaffolding (off by default).
  physics_loss_enabled: false
  lambda_smooth: 0.0
  lambda_mass: 0.0
  smoothness_loss_mode: finite_difference_l2
  mass_loss_mode: mean_mass_mse
  # transformed = transformed-space mass consistency
  # raw = inverse-transformed mass consistency (not full physical conservation)
  mass_loss_space: transformed
