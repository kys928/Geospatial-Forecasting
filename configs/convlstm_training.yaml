# Phase-E narrow ConvLSTM trainer defaults aligned with canonical contract.
convlstm_training:
  sequence_length: 3
  input_channels: 10
  input_shape: [3, 10, 64, 64]
  stored_target_shape: [1, 10, 64, 64]
  supervised_target_shape: [1, 1, 64, 64]
  target_policy: plume_only
  plume_target_channel: 0
  normalization_mode: none
  loss_space: transformed_plume
  # Training loss remains in transformed plume space.
  # Raw-space interpretation requires inverse transform:
  # raw = (exp(pred) - 1) / 1e12
  raw_interpretation_formula: "raw = (exp(pred) - 1) / 1e12"
  learning_rate: 0.001
  trainable_parameter_scope: full_model
  # Phase-M canonical stored dataset wiring (optional convenience fields).
  train_data_path: null
  val_data_path: null
  batch_size: 1
  shuffle_train: false
  shuffle_seed: 0
  drop_last: false

  eval_metric: val_mse
  eval_direction: min
  checkpoint_metric: val_mse
  checkpoint_direction: min
  save_best_only: true

  # Phase-G physics-loss scaffolding (off by default).
  physics_loss_enabled: false
  lambda_smooth: 0.0
  lambda_mass: 0.0
  smoothness_loss_mode: finite_difference_l2
  mass_loss_mode: mean_mass_mse
  # transformed = transformed-space mass consistency
  # raw = inverse-transformed mass consistency (not full physical conservation)
  mass_loss_space: transformed

  # Phase-H staged scheduling for physics losses (epoch-based only).
  # When disabled, lambda_smooth/lambda_mass behave exactly as static Phase-G settings.
  physics_schedule_enabled: false
  physics_schedule_type: epoch
  physics_schedule_stage_boundaries: [0]
  physics_schedule_lambda_smooth: [0.0]
  physics_schedule_lambda_mass: [0.0]

  # Optional linear ramps for each physics loss component.
  # none = immediate stage weight; linear = ramp 0->stage weight across [start, end] epochs.
  smoothness_ramp_type: none
  smoothness_ramp_start: 0
  smoothness_ramp_end: 0
  mass_ramp_type: none
  mass_ramp_start: 0
  mass_ramp_end: 0

  # Phase-I optional metric-gated stage progression layered on top of Phase-H schedule.
  # When disabled, stage advancement remains epoch-boundary based exactly as Phase-H.
  metric_stage_progression_enabled: false
  metric_stage_monitor: val_mse
  metric_stage_direction: min
  # One threshold per transition: stage0->1, stage1->2, ...
  metric_stage_thresholds: []
  metric_stage_min_epoch_per_stage: 0
  metric_stage_patience: 0

  # Phase-J plume-specific evaluation metrics (trainer-local reporting only).
  plume_mass_metric_enabled: true
  # Optional raw-space mass error uses inverse transform for interpretation only.
  plume_mass_metric_include_raw: false
  plume_support_metric_enabled: true
  plume_support_threshold_space: transformed
  plume_support_threshold_value: 0.1
  plume_centroid_metric_enabled: true
  # Raster-space center-of-mass distance (index space, not geographic distance).
  plume_centroid_metric_space: transformed
